<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura — Premium Spaced Repetition</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #09090b;
            --bg-card: #121214;
            --bg-card-hover: #1a1a1e;
            --border: rgba(255, 255, 255, 0.08);
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --text-muted: #52525b;
            
            /* Premium Accent Palette */
            --accent: #d4af37; /* Matte Gold */
            --accent-glow: rgba(212, 175, 55, 0.15);
            --success: #10b981;
            --error: #ef4444;
            
            /* HLR Decay / Health colors */
            --health-high: #34d399;
            --health-mid: #fbbf24;
            --health-low: #f87171;

            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --font-serif: 'Playfair Display', serif;
            
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding: 2rem 1rem;
        }

        /* App Container */
        .app-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Header / Dashboard Metrics */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .brand {
            font-family: var(--font-serif);
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .metrics {
            display: flex;
            gap: 1rem;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .metric-badge {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 0.5rem 0.75rem;
            border-radius: 99px;
            display: flex;
            align-items: center;
            gap: 0.35rem;
            color: var(--text-secondary);
        }
        
        .metric-badge.active i {
            color: var(--accent);
            filter: drop-shadow(0 0 4px var(--accent));
        }

        /* Global Smart Session Status Bar (Duolingo Style Progression) */
        .session-progress-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .progress-bar-track {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 99px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent) 0%, #f3e5ab 100%);
            border-radius: 99px;
            transition: var(--transition);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        /* Lexeme / Vocabulary Dashboard Grid */
        .dashboard-view {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .smart-cta {
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(20,20,22,1) 100%);
            border: 1px solid var(--border);
            padding: 1.75rem;
            border-radius: 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .smart-cta::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at top right, var(--accent-glow), transparent 60%);
            pointer-events: none;
        }

        .smart-cta:hover {
            transform: translateY(-2px);
            border-color: rgba(212, 175, 55, 0.3);
        }

        .smart-cta h3 {
            font-family: var(--font-serif);
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
        }

        .smart-cta p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1.25rem;
            line-height: 1.4;
        }

        .btn-premium {
            background: var(--text-primary);
            color: var(--bg-dark);
            border: none;
            padding: 0.85rem 1.75rem;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            font-family: var(--font-sans);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition);
        }

        .btn-premium:hover {
            background: #fff;
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(255,255,255,0.15);
        }

        /* Lexeme Registry List */
        .lexeme-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .lexeme-row {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 1rem 1.25rem;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
        }

        .lexeme-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .lexeme-word {
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: -0.01em;
        }

        .lexeme-translation {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .lexeme-status {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.4rem;
            width: 100px;
        }

        .half-life-text {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .health-bar-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 99px;
            overflow: hidden;
        }

        .health-bar-fill {
            height: 100%;
            border-radius: 99px;
            transition: width 0.5s ease;
        }

        /* Core Flashcard Interface (Stage View) */
        .stage-view {
            display: none; /* Managed by JS switching */
            flex-direction: column;
            gap: 2rem;
            perspective: 1000px;
        }

        .card-perspective {
            width: 100%;
            height: 340px;
            cursor: pointer;
            position: relative;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 32px;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 32px;
            border: 1px solid var(--border);
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        .card-front {
            background: linear-gradient(145deg, var(--bg-card) 0%, #16161a 100%);
        }

        .card-back {
            background: linear-gradient(145deg, #131317 0%, var(--bg-dark) 100%);
            transform: rotateY(180deg);
        }

        .card-meta-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .card-main-content {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            justify-content: center;
            flex: 1;
        }

        .prompt-word {
            font-family: var(--font-serif);
            font-size: 2.5rem;
            font-weight: 500;
            letter-spacing: -0.02em;
        }

        .prompt-context {
            font-size: 0.95rem;
            color: var(--text-secondary);
            font-style: italic;
            line-height: 1.4;
            max-width: 80%;
            margin: 0 auto;
        }

        .reveal-hint-text {
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: 500;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
            opacity: 0.7;
        }

        /* Input Controls Room (Duolingo Evaluative Engine) */
        .interaction-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .eval-buttons {
            display: none; /* Visible only when card flipped */
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            width: 100%;
        }

        .btn-action {
            padding: 1.1rem;
            border-radius: 16px;
            font-family: var(--font-sans);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: var(--transition);
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .btn-action[data-status="wrong"] {
            border-color: rgba(239, 68, 110, 0.2);
        }
        .btn-action[data-status="wrong"]:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--error);
            color: var(--error);
        }

        .btn-action[data-status="correct"] {
            border-color: rgba(16, 185, 129, 0.2);
        }
        .btn-action[data-status="correct"]:hover {
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--success);
            color: var(--success);
        }

        .hint-disclosure {
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed var(--border);
            border-radius: 14px;
            padding: 0.85rem 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: none;
            align-items: center;
            gap: 0.5rem;
            line-height: 1.4;
        }

        .hint-disclosure i {
            color: var(--accent);
            flex-shrink: 0;
        }

        /* Utilities */
        .hidden { display: none !important; }
        .flex { display: flex !important; }

        /* Smooth subtle keyframe entries */
        @keyframes subtleScale {
            from { transform: scale(0.98); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .animate-fade-in {
            animation: subtleScale 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Persistent Premium Status Bar -->
        <header>
            <div class="brand">
                <span>AURA</span>
            </div>
            <div class="metrics">
                <div class="metric-badge active" title="Current Daily Streak">
                    <i data-lucide="zap"></i>
                    <span id="streak-count">6</span>
                </div>
                <div class="metric-badge" title="Total Retained Lexemes">
                    <i data-lucide="layers"></i>
                    <span id="retained-count">0</span>
                </div>
            </div>
        </header>

        <!-- Contextual Duolingo HLR Progress Module -->
        <div class="session-progress-container" id="session-progress-wrapper">
            <button class="btn-action" id="exit-session-btn" style="padding: 0.4rem; border-radius: 50%; width: 32px; height: 32px;" title="Exit Session">
                <i data-lucide="x" style="width: 16px; height: 16px;"></i>
            </button>
            <div class="progress-bar-track">
                <div class="progress-bar-fill" id="session-progress"></div>
            </div>
        </div>

        <!-- VIEW 1: PREMIUM USER DASHBOARD -->
        <div id="dashboard-view" class="dashboard-view animate-fade-in">
            <div class="smart-cta" id="start-srs-session">
                <h3>Personalized Practice</h3>
                <p>Our Half-Life Regression model indicates <strong><span id="decayed-count-prompt">3</span> concepts</strong> are approaching their memory critical dip threshold.</p>
                <button class="btn-premium">
                    <i data-lucide="sparkles"></i> Begin Review
                </button>
            </div>

            <div>
                <h4 class="section-title">Lexeme Registry (SRS Status)</h4>
                <div class="lexeme-list" id="lexeme-container">
                    <!-- Dynamic Rows Rendered by JS Engine -->
                </div>
            </div>
        </div>

        <!-- VIEW 2: SRS COGNITIVE STAGE (FLASHCARD CORE) -->
        <div id="stage-view" class="stage-view">
            <div class="card-perspective" id="card-trigger">
                <div class="flashcard" id="interactive-card">
                    
                    <!-- Front Face -->
                    <div class="card-face card-front">
                        <div class="card-meta-top">
                            <span id="card-category-front">Grammar Lexeme</span>
                            <div id="card-health-indicator-front" style="display: flex; align-items:center; gap:4px;">
                                <div style="width:8px; height:8px; border-radius:50%;" id="health-dot"></div>
                            </div>
                        </div>
                        <div class="card-main-content">
                            <span class="prompt-word" id="word-front">--</span>
                            <p class="prompt-context" id="context-front">--</p>
                        </div>
                        <div class="reveal-hint-text">
                            <i data-lucide="rotate-cw" style="width: 14px; height:14px;"></i> Tap card to flip and evaluate
                        </div>
                    </div>

                    <!-- Back Face -->
                    <div class="card-face card-back">
                        <div class="card-meta-top">
                            <span>Target Translation</span>
                            <i data-lucide="check-circle-2" style="width: 14px; color: var(--text-muted)"></i>
                        </div>
                        <div class="card-main-content">
                            <span class="prompt-word" id="word-back" style="color: var(--accent)">--</span>
                            <p class="prompt-context" id="context-back">--</p>
                        </div>
                        <div style="height: 14px;"></div> <!-- Spacer matching front layout structure -->
                    </div>

                </div>
            </div>

            <!-- Interaction Mechanics Footer -->
            <div class="interaction-panel">
                <div class="hint-disclosure" id="hint-panel">
                    <i data-lucide="help-circle"></i>
                    <span id="hint-text"></span>
                </div>
                
                <!-- Prompt Toggle Mode Box -->
                <button class="btn-action" id="request-hint-btn" style="font-size: 0.85rem; color: var(--text-secondary);">
                    <i data-lucide="eye" style="width:16px;"></i> Reveal Passive Hint
                </button>

                <!-- Spaced Repetition Algorithmic Evaluations Hooks -->
                <div class="eval-buttons" id="eval-actions-wrapper">
                    <button class="btn-action" data-status="wrong" id="btn-eval-wrong">
                        <i data-lucide="x-circle"></i> Forgot / Miscalculated
                    </button>
                    <button class="btn-action" data-status="correct" id="btn-eval-correct">
                        <i data-lucide="check-circle"></i> Retained Cleanly
                    </button>
                </div>
            </div>
        </div>

    </div>

    <!-- App Engine -->
    <script>
        /**
         * Aura Premium Spaced Repetition Engine
         * Built on customized localized predictive Half-Life Regression calculations
         */

        // Initial High-Fidelity Mock Database Configuration
        const INITIAL_LEXEMES = [
            { id: 'l1', word: 'Resilience', translation: 'La Resiliencia', context: 'The capacity to recover quickly from difficulties.', hint: 'Think psychological flexibility and elasticity.', halfLifeHours: 12, lastTested: Date.now() - (14 * 60 * 60 * 1000) }, // Decayed past 50%
            { id: 'l2', word: 'Ephemeral', translation: 'Efímero', context: 'Lasting for a very short time.', hint: 'Like a passing shadow or a morning mist.', halfLifeHours: 48, lastTested: Date.now() - (52 * 60 * 60 * 1000) }, // Decayed past 50%
            { id: 'l3', word: 'Serendipity', translation: 'Serendipia', context: 'The occurrence of events by chance in a happy way.', hint: 'A fortunate, accidental stroke of luck.', halfLifeHours: 120, lastTested: Date.now() - (10 * 60 * 60 * 1000) }, // Stable state
            { id: 'l4', word: 'Nostalgia', translation: 'La Nostalgia', context: 'A sentimental longing or wistful affection for the past.', hint: 'Homesickness mixed with sweet sorrow.', halfLifeHours: 24, lastTested: Date.now() - (26 * 60 * 60 * 1000) } // Decayed past 50%
        ];

        /**
         * MANUAL_SEED
         * Add new hardcoded flash cards here for quick development/testing.
         * Copy one of the objects below and edit the fields. Use simple entries
         * — the engine will initialize halfLifeHours and lastTested if omitted.
         * Example:
         * { id: 'm1', word: 'Ethereal', translation: 'Etéreo', context: '...', hint: '...' }
         */
        const MANUAL_SEED = [
            
            ];

        // System State
        // Load saved lexemes or fall back to MANUAL_SEED + INITIAL_LEXEMES for easy hardcoding
        let lexemes = JSON.parse(localStorage.getItem('aura_lexemes')) || (MANUAL_SEED.length ? MANUAL_SEED.concat(INITIAL_LEXEMES) : INITIAL_LEXEMES);
        let activeSessionQueue = [];
        let totalQueueLength = 0;
        let currentActiveIndex = 0;
        let hintRequestedForCurrentCard = false;

        // UI View State Nodes
        const views = {
            dashboard: document.getElementById('dashboard-view'),
            stage: document.getElementById('stage-view'),
            progressWrapper: document.getElementById('session-progress-wrapper')
        };

        // Initialize App Layout & Engine Loop
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            calculateAndRenderDashboard();
            setupEventListeners();
        });

        function saveToStorage() {
            localStorage.setItem('aura_lexemes', JSON.stringify(lexemes));
        }

        /**
         * Factory to generate standardized SRS flashcards
         * Automatically boots new concepts to an active decay state for immediate ingestion
         */
        function addLexeme(word, translation, context = '', hint = '') {
            const newCard = {
                id: 'l_' + Date.now() + Math.random().toString(36).substr(2, 4),
                word: (word || '').trim(),
                translation: (translation || '').trim(),
                context: (context || '').trim() || 'Context not specified.',
                hint: (hint || '').trim() || 'No context hint available.',
                halfLifeHours: 4, // Starts at base floor interval (4 hours)
                lastTested: Date.now() - (6 * 60 * 60 * 1000) // Backdated 6 hours so it forces immediate review
            };

            lexemes.push(newCard);
            saveToStorage();
            calculateAndRenderDashboard(); // Hot-reloads the layout cleanly
            return newCard;
        }

        /**
         * Core Mathematical Logic - Half-Life Regression Engine
         * Probability of Retention: P = 2^(-t / h)
         * Where t = elapsed hours, h = parameter word half-life assignment
         */
        function calculateRetention(lexeme) {
            const elapsedHours = (Date.now() - lexeme.lastTested) / (1000 * 60 * 60);
            const retentionProbability = Math.pow(2, -elapsedHours / lexeme.halfLifeHours);
            return Math.min(Math.max(retentionProbability, 0.0), 1.0);
        }

        function calculateAndRenderDashboard() {
            const container = document.getElementById('lexeme-container');
            container.innerHTML = '';
            let decayedCount = 0;
            let healthyCount = 0;

            lexemes.forEach(item => {
                const retention = calculateRetention(item);
                const percentage = Math.round(retention * 100);
                
                let healthColor = varLookUp('--health-high');
                if (retention < 0.5) {
                    decayedCount++;
                    healthColor = varLookUp('--health-low');
                } else if (retention < 0.75) {
                    healthColor = varLookUp('--health-mid');
                } else {
                    healthyCount++;
                }

                // Append Dynamic View Engine Row Markup
                const row = document.createElement('div');
                row.className = 'lexeme-row';
                row.innerHTML = `
                    <div class="lexeme-info">
                        <span class="lexeme-word">${item.word}</span>
                        <span class="lexeme-translation">${item.translation}</span>
                    </div>
                    <div class="lexeme-status">
                        <span class="half-life-text">${percentage}% Recall</span>
                        <div class="health-bar-track">
                            <div class="health-bar-fill" style="width: ${percentage}%; background-color: ${healthColor};"></div>
                        </div>
                    </div>
                `;
                container.appendChild(row);
            });

            // Safely update the CTA paragraph so we don't destroy structural nodes
            const ctaParagraph = document.querySelector('#start-srs-session p');
            if (decayedCount === 0) {
                if (ctaParagraph) ctaParagraph.innerText = 'All items are mathematically stable in memory lanes.';
            } else {
                if (ctaParagraph) ctaParagraph.innerHTML = `Our Half-Life Regression model indicates <strong><span id="decayed-count-prompt">${decayedCount}</span> concepts</strong> are approaching their memory critical dip threshold.`;
            }

            // Update retained metric
            const retainedEl = document.getElementById('retained-count');
            if (retainedEl) retainedEl.innerText = healthyCount;

            // Hide session metrics track during base dashboard status checks
            views.progressWrapper.style.visibility = 'hidden';
        }

        function varLookUp(variableName) {
            return getComputedStyle(document.documentElement).getPropertyValue(variableName).trim();
        }

        function setupEventListeners() {
            // Navigation Elements Hook
            document.getElementById('start-srs-session').addEventListener('click', initiateSRSSession);
            document.getElementById('exit-session-btn').addEventListener('click', exitSessionView);
            
            // Core Card Flip Engine Hook
            document.getElementById('card-trigger').addEventListener('click', toggleCardFlip);
            
            // Hint Engine Setup Toggle
            document.getElementById('request-hint-btn').addEventListener('click', revealPassiveHint);

            // Algorithmic SRS Button Hooks
            document.getElementById('btn-eval-correct').addEventListener('click', () => handleEvaluationOutcome(true));
            document.getElementById('btn-eval-wrong').addEventListener('click', () => handleEvaluationOutcome(false));
        }

        /**
         * Duolingo Adaptive Scheduling Engine Architecture
         * Pulls items decaying under peak thresholds dynamically into structured sessions
         */
        function initiateSRSSession() {
            // Only pull items that have begun to actively decay (e.g., below 95% retention)
            let candidates = lexemes.filter(item => calculateRetention(item) < 0.95);

            // Fallback: If everything is perfectly fresh, allow reviewing the absolute lowest
            if (candidates.length === 0) {
                candidates = [...lexemes];
            }

            activeSessionQueue = candidates.sort((a, b) => calculateRetention(a) - calculateRetention(b));

            // Limit to actionable session sizes to prevent user attrition
            activeSessionQueue = activeSessionQueue.slice(0, 5);
            totalQueueLength = activeSessionQueue.length;
            currentActiveIndex = 0;

            if (totalQueueLength === 0) return;

            views.dashboard.style.display = 'none';
            views.stage.style.display = 'flex';
            views.progressWrapper.style.visibility = 'visible';

            renderCurrentSessionCard();
            updateProgressBar();
        }

        function renderCurrentSessionCard() {
            if (currentActiveIndex >= totalQueueLength) {
                completeSessionView();
                return;
            }

            // Reset interaction parameters
            hintRequestedForCurrentCard = false;
            document.getElementById('hint-panel').style.display = 'none';
            document.getElementById('request-hint-btn').style.display = 'inline-flex';
            document.getElementById('eval-actions-wrapper').style.display = 'none';
            document.getElementById('interactive-card').classList.remove('flipped');

            const item = activeSessionQueue[currentActiveIndex];
            const retention = calculateRetention(item);

            // Set UI copy definitions dynamically
            document.getElementById('word-front').innerText = item.word;
            document.getElementById('context-front').innerText = item.context;
            document.getElementById('word-back').innerText = item.translation;
            document.getElementById('context-back').innerText = `"${item.context}"`;
            document.getElementById('hint-text').innerText = item.hint;

            // Compute and apply context color points to card top status parameters
            const healthDot = document.getElementById('health-dot');
            if (retention < 0.5) healthDot.style.backgroundColor = varLookUp('--health-low');
            else if (retention < 0.75) healthDot.style.backgroundColor = varLookUp('--health-mid');
            else healthDot.style.backgroundColor = varLookUp('--health-high');
        }

        function toggleCardFlip() {
            const card = document.getElementById('interactive-card');
            card.classList.toggle('flipped');
            
            // Determine visibility vectors of underlying evaluation matrices mapping
            const isFlipped = card.classList.contains('flipped');
            if (isFlipped) {
                document.getElementById('eval-actions-wrapper').style.display = 'grid';
                document.getElementById('request-hint-btn').style.display = 'none';
            }
        }

        function revealPassiveHint() {
            hintRequestedForCurrentCard = true;
            document.getElementById('hint-panel').style.display = 'flex';
            document.getElementById('request-hint-btn').style.display = 'none';
        }

        /**
         * HLR Predictive Update Algorithms Runtime Execution Engine
         * Updates target parameters mapping values explicitly directly on storage items
         */
        function handleEvaluationOutcome(isCorrect) {
            const currentItem = activeSessionQueue[currentActiveIndex];
            const matchedLexeme = lexemes.find(l => l.id === currentItem.id);

            if (matchedLexeme) {
                let currentHalfLife = matchedLexeme.halfLifeHours;

                if (isCorrect) {
                    const elapsedHours = (Date.now() - matchedLexeme.lastTested) / (1000 * 60 * 60);

                    // Dynamic Spacing: shorter intervals grow faster; mature intervals expand conservatively
                    let adaptiveMultiplier = matchedLexeme.halfLifeHours < 48 ? 2.5 : 1.6;

                    // Reduce growth if the user needed a hint
                    if (hintRequestedForCurrentCard) {
                        adaptiveMultiplier *= 0.6;
                    }

                    const computedExtension = Math.max(elapsedHours, matchedLexeme.halfLifeHours) * adaptiveMultiplier;
                    matchedLexeme.halfLifeHours = Math.min(computedExtension, 720); // 720 hours = 30 days
                } else {
                    // Soft-Landing Penalty: preserve storage strength for mature cards
                    if (matchedLexeme.halfLifeHours > 72) {
                        matchedLexeme.halfLifeHours = matchedLexeme.halfLifeHours * 0.5; // Moderate drop for mature cards
                    } else {
                        matchedLexeme.halfLifeHours = Math.max(matchedLexeme.halfLifeHours * 0.25, 4); // Sharper reset for volatile cards
                    }
                }

                matchedLexeme.lastTested = Date.now();
                saveToStorage();
            }

            // Step queue forward
            currentActiveIndex++;
            updateProgressBar();
            
            // Delay transitions mechanics to protect UX perspective rotations space loops
            setTimeout(() => {
                renderCurrentSessionCard();
            }, 300);
        }

        function updateProgressBar() {
            const ratio = (currentActiveIndex / totalQueueLength) * 100;
            document.getElementById('session-progress').style.width = `${ratio}%`;
        }

        function completeSessionView() {
            exitSessionView();
            // Upward streak adjustments
            const streakElement = document.getElementById('streak-count');
            streakElement.innerText = parseInt(streakElement.innerText) + 1;
        }

        function exitSessionView() {
            views.stage.style.display = 'none';
            views.dashboard.style.display = 'flex';
            calculateAndRenderDashboard();
        }
    </script>
</body>

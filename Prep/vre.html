<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura — Premium Spaced Repetition</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
<style>
        :root {
            --bg-dark: #09090b;
            --bg-card: #121214;
            --bg-card-hover: #1a1a1e;
            --border: rgba(255, 255, 255, 0.08);
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --text-muted: #52525b;
            
            /* Premium Accent Palette */
            --accent: #d4af37; /* Matte Gold */
            --accent-glow: rgba(212, 175, 55, 0.15);
            --success: #10b981;
            --error: #ef4444;
            
            /* HLR Decay / Health colors */
            --health-high: #34d399;
            --health-mid: #fbbf24;
            --health-low: #f87171;

            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --font-serif: 'Playfair Display', serif;
            
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding: 1rem;
        }

        /* App Container */
        .app-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Header / Dashboard Metrics */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .brand {
            font-family: var(--font-serif);
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Small left-side themed navigation CTA */
        .nav-cta {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
            border: 1px solid rgba(255,255,255,0.06);
            margin-right: 0.5rem;
            color: var(--text-primary);
            text-decoration: none;
            transition: var(--transition);
            box-shadow: 0 6px 18px rgba(0,0,0,0.45), 0 0 10px var(--accent-glow);
        }

        .nav-cta i { color: var(--accent); width: 18px; height: 18px; }

        .metrics {
            display: flex;
            gap: 0.75rem;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .metric-badge {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 0.5rem 0.75rem;
            border-radius: 99px;
            display: flex;
            align-items: center;
            gap: 0.35rem;
            color: var(--text-secondary);
        }
        
        .metric-badge.active i {
            color: var(--accent);
            filter: drop-shadow(0 0 4px var(--accent));
        }

        /* Session Status Bar */
        .session-progress-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .progress-bar-track {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 99px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent) 0%, #f3e5ab 100%);
            border-radius: 99px;
            transition: var(--transition);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        /* Dashboard View */
        .dashboard-view {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .smart-cta {
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(20,20,22,1) 100%);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .smart-cta::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at top right, var(--accent-glow), transparent 60%);
            pointer-events: none;
        }

        .smart-cta h3 {
            font-family: var(--font-serif);
            font-size: 1.35rem;
            margin-bottom: 0.5rem;
        }

        .smart-cta p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1.25rem;
            line-height: 1.4;
        }

        .btn-premium {
            background: var(--text-primary);
            color: var(--bg-dark);
            border: none;
            padding: 0.85rem 1.75rem;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            font-family: var(--font-sans);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition);
        }

        /* Lexeme Registry List */
        .lexeme-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .lexeme-row {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            transition: var(--transition);
        }

        .lexeme-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            flex: 1;
            min-width: 0;
        }

        .lexeme-word {
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: -0.01em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .lexeme-translation {
            font-size: 0.85rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .lexeme-status {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.4rem;
            width: 90px;
            flex-shrink: 0;
        }

        .half-life-text {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .health-bar-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 99px;
            overflow: hidden;
        }

        .health-bar-fill {
            height: 100%;
            border-radius: 99px;
            transition: width 0.5s ease;
        }

        /* Stage View Layout */
        .stage-view {
            display: none;
            flex-direction: column;
            gap: 1.5rem;
            perspective: 1000px;
        }

        .card-perspective {
            width: 100%;
            height: 360px;
            cursor: pointer;
            position: relative;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 28px;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 28px;
            border: 1px solid var(--border);
            padding: 1.75rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }

        .card-front {
            background: linear-gradient(145deg, var(--bg-card) 0%, #16161a 100%);
        }

        .card-back {
            background: linear-gradient(145deg, #131317 0%, var(--bg-dark) 100%);
            transform: rotateY(180deg);
        }

        .card-meta-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .card-main-content {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            justify-content: flex-start; /* CHANGED from center to fix top-cutoff scroll bug */
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 0.5rem 0;
        }

        .prompt-word {
            font-family: var(--font-serif);
            font-size: 1.85rem;
            font-weight: 500;
            letter-spacing: -0.01em;
            line-height: 1.2;
        }

        .prompt-context {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-style: italic;
            line-height: 1.4;
            max-width: 95%;
            margin: 0 auto;
        }

        .reveal-hint-text {
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: 500;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
            opacity: 0.8;
        }

        /* Interaction Panels */
        .interaction-panel {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .eval-buttons {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            width: 100%;
        }

        .btn-action {
            padding: 1rem 0.75rem;
            border-radius: 16px;
            font-family: var(--font-sans);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: var(--transition);
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .btn-action[data-status="wrong"]:hover,
        .btn-action[data-status="wrong"]:active {
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--error);
            color: var(--error);
        }

        .btn-action[data-status="correct"]:hover,
        .btn-action[data-status="correct"]:active {
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--success);
            color: var(--success);
        }

        .hint-disclosure {
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed var(--border);
            border-radius: 14px;
            padding: 0.85rem 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: none;
            align-items: center;
            gap: 0.5rem;
            line-height: 1.4;
        }

        .hint-disclosure i {
            color: var(--accent);
            flex-shrink: 0;
        }

        /* Utilities */
        .hidden { display: none !important; }
        .flex { display: flex !important; }

        @keyframes subtleScale {
            from { transform: scale(0.98); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .animate-fade-in {
            animation: subtleScale 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        /* Premium Native App Scrollbar Styling */
        .card-main-content::-webkit-scrollbar {
            width: 4px; /* Ultra thin scrollbar */
            height: 4px;
        }

        .card-main-content::-webkit-scrollbar-track {
            background: transparent; /* No ugly background track box */
        }

        .card-main-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1); /* Subtle premium track indicator */
            border-radius: 99px;
            transition: var(--transition);
        }

        .card-main-content::-webkit-scrollbar-thumb:hover {
            background: var(--accent); /* Glows gold only when active/interacted with */
        }

        /* Smooth iOS Momentum Scrolling */
        .card-main-content {
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin; /* Firefox support */
            scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
        }
        /* Responsive fixes for action buttons */
        .btn-action { min-width: 0; box-sizing: border-box; }
        .eval-buttons { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
        @media (max-width: 420px) {
            .eval-buttons { grid-template-columns: 1fr; gap: 0.5rem; }
            .btn-action { padding: 0.85rem; font-size: 0.9rem; }
            .btn-premium { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Persistent Premium Status Bar -->
        <header>
                        <a id="left-nav-cta" class="nav-cta" href="../index.html">
                <i data-lucide="chevrons-left"></i>
            </a>
<div class="brand">
                <span>AURA</span>
            </div>
            <div class="metrics">
                <div class="metric-badge active" title="Current Daily Streak">
                    <i data-lucide="zap"></i>
                    <span id="streak-count">6</span>
                </div>
                <div class="metric-badge" title="Total Retained Lexemes">
                    <i data-lucide="layers"></i>
                    <span id="retained-count">0</span>
                </div>
            </div>
        </header>

        <!-- Contextual Duolingo HLR Progress Module -->
        <div class="session-progress-container" id="session-progress-wrapper">
            <button class="btn-action" id="exit-session-btn" style="padding: 0.4rem; border-radius: 50%; width: 32px; height: 32px;" title="Exit Session">
                <i data-lucide="x" style="width: 16px; height: 16px;"></i>
            </button>
            <div class="progress-bar-track">
                <div class="progress-bar-fill" id="session-progress"></div>
            </div>
        </div>

        <!-- VIEW 1: PREMIUM USER DASHBOARD -->
        <div id="dashboard-view" class="dashboard-view animate-fade-in">
            <div class="smart-cta" id="start-srs-session">
                <h3>Personalized Practice</h3>
                <p>Our Half-Life Regression model indicates <strong><span id="decayed-count-prompt">3</span> concepts</strong> are approaching their memory critical dip threshold.</p>
                <button class="btn-premium">
                    <i data-lucide="sparkles"></i> Begin Review
                </button>
            </div>

            <div>
                <h4 class="section-title">Lexeme Registry (SRS Status)</h4>
                <div class="lexeme-list" id="lexeme-container">
                    <!-- Dynamic Rows Rendered by JS Engine -->
                </div>
            </div>
        </div>

        <!-- VIEW 2: SRS COGNITIVE STAGE (FLASHCARD CORE) -->
        <div id="stage-view" class="stage-view">
            <div class="card-perspective" id="card-trigger">
                <div class="flashcard" id="interactive-card">
                    
                    <!-- Front Face -->
                    <div class="card-face card-front">
                        <div class="card-meta-top">
                            <span id="card-category-front">Grammar Lexeme</span>
                            <div id="card-health-indicator-front" style="display: flex; align-items:center; gap:4px;">
                                <div style="width:8px; height:8px; border-radius:50%;" id="health-dot"></div>
                            </div>
                        </div>
                        <div class="card-main-content">
                            <span class="prompt-word" id="word-front">--</span>
                            <p class="prompt-context" id="context-front">--</p>
                        </div>
                        <div class="reveal-hint-text">
                            <i data-lucide="rotate-cw" style="width: 14px; height:14px;"></i> Tap card to flip and evaluate
                        </div>
                    </div>

                    <!-- Back Face -->
                    <div class="card-face card-back">
                        <div class="card-meta-top">
                            <span>Target Translation</span>
                            <i data-lucide="check-circle-2" style="width: 14px; color: var(--text-muted)"></i>
                        </div>
                        <div class="card-main-content">
                            <span class="prompt-word" id="word-back" style="color: var(--accent)">--</span>
                            <p class="prompt-context" id="context-back">--</p>
                        </div>
                        <div style="height: 14px;"></div> <!-- Spacer matching front layout structure -->
                    </div>

                </div>
            </div>

            <!-- Interaction Mechanics Footer -->
            <div class="interaction-panel">
                <div class="hint-disclosure" id="hint-panel">
                    <i data-lucide="help-circle"></i>
                    <span id="hint-text"></span>
                </div>
                
                <!-- Prompt Toggle Mode Box -->
                <button class="btn-action" id="request-hint-btn" style="font-size: 0.85rem; color: var(--text-secondary);">
                    <i data-lucide="eye" style="width:16px;"></i> Reveal Passive Hint
                </button>

                <!-- Spaced Repetition Algorithmic Evaluations Hooks -->
                <div class="eval-buttons" id="eval-actions-wrapper">
                    <button class="btn-action" data-status="wrong" id="btn-eval-wrong">
                        <i data-lucide="x-circle"></i> Forgot / Miscalculated
                    </button>
                    <button class="btn-action" data-status="correct" id="btn-eval-correct">
                        <i data-lucide="check-circle"></i> Retained Cleanly
                    </button>
                </div>
            </div>
        </div>

    </div>

    <!-- App Engine -->
    <script>
      /**
         * =========================================================================
         *  AURA KNOWLEDGE REGISTRY — HARDCODE NEW FLASHCARDS HERE
         * =========================================================================
         * To append new concepts to your matrix, drop a clean comma-separated object
         * into this array using the exact property keys shown below.
         *
         * No manual IDs, half-lives, or timestamps are needed—the engine will 
         * dynamically provision tracking metrics automatically upon initialization.
         */
        const HARDCODED_DECK = [
            {
    "word": "What happens if my VRC claims they cannot establish an Employment Handicap because my clinical evidence is from 2020?",
    "translation": "Per 38 CFR § 21.51, an employment handicap is determined by evaluating the vocational effects of a service-connected condition, not by requiring immediate medical re-evaluation. My 100% P&T rating legally establishes that my conditions are chronic and permanent. My firsthand testimony today regarding my inability to perform the physical duties of an X-ray tech serves as the current evidence needed to establish this handicap.",
    "context": "Rebutting a counselor who tries to pause your application over old records.",
    "hint": "Remind them that 38 CFR § 21.51 focuses on vocational limitations, not active medical testing."
  },
  {
    "word": "Since you haven't worked since 2019, how do we know your conditions are the actual reason you aren't working right now?",
    "translation": "I have been unable to return to the workforce because my service-connected disabilities physically prevent me from performing the duties of my trained profession. An X-ray tech role requires heavy lifting, pushing imaging machinery, and patient transfers—all of which directly conflict with my left shoulder DJD. Additionally, the chaotic environment exacerbates my PTSD, making entry into a non-accommodating workspace impossible.",
    "context": "Proving a direct link between your long work gap and your disabilities.",
    "hint": "Connect your physical and mental limitations directly to the standard tasks of an X-ray tech."
  },
  {
    "word": "Why shouldn't we just look at a less demanding job in the medical field that doesn't require 8+ years of schooling, like medical coding?",
    "translation": "Per 38 U.S. Code § 3100, the purpose of VR&E is to help me achieve 'suitable employment' that maximizes my independence and capabilities. Medical coding or low-level clerical work does not utilize my extensive background in medical imaging. Radiology allows me to leverage my existing technical expertise in a safe, completely cognitive, and controlled environment that protects my shoulder and accommodates my PTSD.",
    "context": "Defending your high-level goal against a counselor trying to push you into a quick, low-level job.",
    "hint": "Cite the legal standard of 'suitable employment' that aligns with your aptitude and background."
  },
  {
    "word": "Medical school requires intense clinical rotations with long hours and high stress. How will your PTSD handle that environment?",
    "translation": "My PTSD is highly manageable when I am operating within structured, predictable, and academically rigorous environments. I have spent significant time developing independent coping strategies and tracking my focus through structured study. Furthermore, the ultimate goal of Radiology is a highly independent field where professionals review scans in controlled reading rooms, making the long-term career entirely viable.",
    "context": "Addressing fears about your mental health stability during training.",
    "hint": "Highlight your current self-discipline, routine, and the calm nature of the final career objective."
  },
  {
    "word": "If we approve an undergraduate or post-baccalaureate program, what guarantee do we have that you will actually get into medical school?",
    "translation": "I suggest we structure my Individual Written Rehabilitation Plan (IWRP) using a phased milestone approach under M28C guidelines. The initial phase will focus entirely on completing my pre-med prerequisites and undergraduate requirements. We can write a specific metric into the plan: once I achieve the necessary GPA and competitive MCAT scores, we will then amend the plan to fund the medical school phase.",
    "context": "Overcoming the VRC's resistance to committing to a long-term professional degree upfront.",
    "hint": "Propose a multi-phase IWRP to reduce the counselor's perceived risk."
  },
  {
    "word": "Your left shoulder DJD is severe. How will you handle the physical demands of medical school anatomy labs or basic patient examinations?",
    "translation": "Medical school accommodations under the ADA routinely provide adjustments for physical limitations during labs, such as modified positioning or assistive tools. More importantly, the core duties of a Radiologist are strictly cognitive and diagnostic. Unlike general surgery or emergency medicine, Radiology does not require manual manipulation or heavy lifting, making it perfectly suited to my physical restrictions.",
    "context": "Rebutting concerns about the physical barriers encountered during medical training.",
    "hint": "Differentiate temporary training hurdles from the permanent, low-impact duties of the final career."
  },
  {
    "word": "Can we look at an online health administration degree instead, since it completely removes you from a hospital environment?",
    "translation": "While health administration is a safe environment, it does not offer a suitable match for my specialized vocational aptitudes and existing medical knowledge. VR&E guidelines emphasize finding employment that ensures long-term career stability and personal independence. Radiology provides the ideal blend of a controlled environment and high-level medical analysis that matches my background.",
    "context": "Rebutting a VRC who tries to force you into an online desk job.",
    "hint": "Argue that suitability involves both safety and utilizing your specialized cognitive strengths."
  },
  {
    "word": "What if you experience a flare-up of your PTSD symptoms during your academic program?",
    "translation": "I have built a strong foundation of personal routines, self-directed scheduling, and structured environments that keep my symptoms stable. Should a flare-up occur, I will utilize campus disability resource centers for academic accommodations, such as testing adjustments. VR&E also provides counseling and plan adjustments under 38 CFR § 21.362 to support veterans through temporary health changes.",
    "context": "Assuring the VRC that you have a contingency plan for managing mental health hurdles.",
    "hint": "Show that you are aware of both academic accommodations and VR&E support regulations."
  },
  {
    "word": "The VA has already rated you 100% P&T, which implies you are severely disabled. Why do you think you can handle a full-time medical curriculum?",
    "translation": "A 100% P&T rating reflects the severity of my service-connected barriers in a standard, unaccommodated work environment like X-ray technology. It does not mean I lack cognitive capacity. Under 38 U.S. Code § 3100, the program is mandated to help severely disabled veterans achieve maximum independence. My disabilities affect my physical lifting and thrive on independent, structured cognitive tasks.",
    "context": "Correcting a counselor's misconception that a 100% rating means you cannot learn or work.",
    "hint": "Clarify that 100% P&T measures standard workplace impairment, not your academic capability."
  },
  {
    "word": "Why can't you just seek accommodations to remain an X-ray Technologist?",
    "translation": "The core, essential functions of an X-ray Technologist involve the manual manipulation of overhead X-ray tubes, moving heavy portable machines across floors, and physically lifting or stabilizing patients in trauma settings. These actions cannot be accommodated away without fundamentally altering the job description, which is why that field is no longer a viable or suitable occupation for my shoulder DJD.",
    "context": "Explaining why staying in your old career field with accommodations is impossible.",
    "hint": "Argue that the physical demands are essential functions of the job and cannot be accommodated."
  },

        /**
         * Syncs new file insertions into the active tracking engine securely 
         * without altering pre-existing memory progress scores.
         */
        function synchronizeHardcodedDeck() {
            // Purge any stored lexemes that are NOT present in the HARDCODED_DECK.
            // This ensures old/legacy data won't continue to populate the UI.
            const hardcodedSet = new Set(HARDCODED_DECK.map(c => (c.word || '').trim().toLowerCase()).filter(Boolean));

            // If we have existing lexemes, remove those whose normalized word is not in the hardcoded set
            if (Array.isArray(lexemes) && lexemes.length) {
                const originalLength = lexemes.length;
                lexemes = lexemes.filter(l => hardcodedSet.has((l.word || '').trim().toLowerCase()));

                // If the filtered list ended up empty but storage previously had user data,
                // we still want to start with an empty array here so we'll repopulate below.
                if (lexemes.length !== originalLength) {
                    saveToStorage();
                }
            } else {
                // Ensure lexemes is an array if nothing in storage
                lexemes = [];
            }

            // Add any missing hardcoded cards into the lexemes array (without duplicating)
            let changesMade = false;
            HARDCODED_DECK.forEach(card => {
                const normalizedWord = (card.word || '').trim();
                const exists = lexemes.some(l => l.word.toLowerCase() === normalizedWord.toLowerCase());

                if (!exists && normalizedWord !== '') {
                    const trackingId = 'l_' + Math.random().toString(36).substr(2, 5) + '_' + Date.now().toString().slice(-4);
                    lexemes.push({
                        id: trackingId,
                        word: normalizedWord,
                        translation: (card.translation || '').trim(),
                        context: (card.context || '').trim() || 'No application context provided.',
                        hint: (card.hint || '').trim() || 'No specialized hints setup.',
                        halfLifeHours: 4,
                        lastTested: Date.now() - (6 * 60 * 60 * 1000) // Places it instantly into initial test rotation
                    });
                    changesMade = true;
                }
            });

            if (changesMade) saveToStorage();
        }

        /**
         * Standardized programmatic factory invocation layer
         */
        function addLexeme(word, translation, context = '', hint = '') {
            const trackingId = 'l_' + Math.random().toString(36).substr(2, 5) + '_' + Date.now().toString().slice(-4);
            const newCard = {
                id: trackingId,
                word: (word || '').trim(),
                translation: (translation || '').trim(),
                context: (context || '').trim() || 'No application context provided.',
                hint: (hint || '').trim() || 'No specialized hints setup.',
                halfLifeHours: 4, 
                lastTested: Date.now() - (6 * 60 * 60 * 1000)
            };

            lexemes.push(newCard);
            saveToStorage();
            calculateAndRenderDashboard();
            return newCard;
        }

        /**
         * Interface wrapper hooked into the HTML Creator layout block
         */
        function handleFormSubmission(event) {
            event.preventDefault();
            
            const wordInput = document.getElementById('form-word');
            const translationInput = document.getElementById('form-translation');
            const contextInput = document.getElementById('form-context');
            const hintInput = document.getElementById('form-hint');

            addLexeme(wordInput.value, translationInput.value, contextInput.value, hintInput.value);
            event.target.reset();
        }

        /**
         * Core Mathematical Logic - Half-Life Regression Engine
         * Probability of Retention: P = 2^(-t / h)
         */
        function calculateRetention(lexeme) {
            const elapsedHours = (Date.now() - lexeme.lastTested) / (1000 * 60 * 60);
            const retentionProbability = Math.pow(2, -elapsedHours / lexeme.halfLifeHours);
            return Math.min(Math.max(retentionProbability, 0.0), 1.0);
        }

        function calculateAndRenderDashboard() {
            const container = document.getElementById('lexeme-container');
            container.innerHTML = '';
            let decayedCount = 0;
            let healthyCount = 0;

            lexemes.forEach(item => {
                const retention = calculateRetention(item);
                const percentage = Math.round(retention * 100);
                
                let healthColor = varLookUp('--health-high');
                if (retention < 0.5) {
                    decayedCount++;
                    healthColor = varLookUp('--health-low');
                } else if (retention < 0.75) {
                    healthColor = varLookUp('--health-mid');
                } else {
                    healthyCount++;
                }

                const row = document.createElement('div');
                row.className = 'lexeme-row';
                row.setAttribute('tabindex', '0');
                row.style.cursor = 'pointer';
                row.innerHTML = `
                    <div class="lexeme-info">
                        <span class="lexeme-word">${item.word}</span>
                        <span class="lexeme-translation">${item.translation}</span>
                    </div>
                    <div class="lexeme-status">
                        <span class="half-life-text">${percentage}% Recall</span>
                        <div class="health-bar-track">
                            <div class="health-bar-fill" style="width: ${percentage}%; background-color: ${healthColor};"></div>
                        </div>
                    </div>
                `;
                // Start a study session focused on this lexeme when clicked or activated
                row.addEventListener('click', () => startSessionWithLexeme(item.id));
                row.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); startSessionWithLexeme(item.id); }
                });
                container.appendChild(row);
            });

            const ctaParagraph = document.querySelector('#start-srs-session p');
            if (decayedCount === 0) {
                if (ctaParagraph) ctaParagraph.innerText = 'All matrix fields are mathematically safe and stable.';
            } else {
                if (ctaParagraph) ctaParagraph.innerHTML = `Our Half-Life Regression model indicates <strong><span id="decayed-count-prompt">${decayedCount}</span> concepts</strong> are approaching their memory critical dip threshold.`;
            }

            const retainedEl = document.getElementById('retained-count');
            if (retainedEl) retainedEl.innerText = healthyCount;

            views.progressWrapper.style.visibility = 'hidden';
        }

        // Start a session that prioritizes a single lexeme (and fills remaining queue)
        function startSessionWithLexeme(lexemeId) {
            const primary = lexemes.find(l => l.id === lexemeId);
            if (!primary) return;
            let candidates = lexemes.filter(item => calculateRetention(item) < 0.95);
            if (candidates.length === 0) candidates = [...lexemes];
            candidates = candidates.filter(c => c.id !== primary.id);
            activeSessionQueue = [primary].concat(candidates.slice(0, 4));
            totalQueueLength = activeSessionQueue.length;
            currentActiveIndex = 0;

            views.dashboard.style.display = 'none';
            views.stage.style.display = 'flex';
            views.progressWrapper.style.visibility = 'visible';

            renderCurrentSessionCard();
            updateProgressBar();
        }

        function varLookUp(variableName) {
            return getComputedStyle(document.documentElement).getPropertyValue(variableName).trim();
        }

        function setupEventListeners() {
            document.getElementById('start-srs-session').addEventListener('click', initiateSRSSession);
            document.getElementById('exit-session-btn').addEventListener('click', exitSessionView);
            document.getElementById('card-trigger').addEventListener('click', toggleCardFlip);
            document.getElementById('request-hint-btn').addEventListener('click', revealPassiveHint);

            document.getElementById('btn-eval-correct').addEventListener('click', () => handleEvaluationOutcome(true));
            document.getElementById('btn-eval-wrong').addEventListener('click', () => handleEvaluationOutcome(false));
        }

        function initiateSRSSession() {
            let candidates = lexemes.filter(item => calculateRetention(item) < 0.95);

            if (candidates.length === 0) {
                candidates = [...lexemes];
            }

            activeSessionQueue = candidates.sort((a, b) => calculateRetention(a) - calculateRetention(b));
            activeSessionQueue = activeSessionQueue.slice(0, 5);
            totalQueueLength = activeSessionQueue.length;
            currentActiveIndex = 0;

            if (totalQueueLength === 0) return;

            views.dashboard.style.display = 'none';
            views.stage.style.display = 'flex';
            views.progressWrapper.style.visibility = 'visible';

            renderCurrentSessionCard();
            updateProgressBar();
        }

        function renderCurrentSessionCard() {
            if (currentActiveIndex >= totalQueueLength) {
                completeSessionView();
                return;
            }

            hintRequestedForCurrentCard = false;
            document.getElementById('hint-panel').style.display = 'none';
            document.getElementById('request-hint-btn').style.display = 'inline-flex';
            document.getElementById('eval-actions-wrapper').style.display = 'none';
            document.getElementById('interactive-card').classList.remove('flipped');

            const item = activeSessionQueue[currentActiveIndex];
            const retention = calculateRetention(item);

            document.getElementById('word-front').innerText = item.word;
            document.getElementById('context-front').innerText = item.context;
            document.getElementById('word-back').innerText = item.translation;
            document.getElementById('context-back').innerText = item.context;
            document.getElementById('hint-text').innerText = item.hint;

            const healthDot = document.getElementById('health-dot');
            if (retention < 0.5) healthDot.style.backgroundColor = varLookUp('--health-low');
            else if (retention < 0.75) healthDot.style.backgroundColor = varLookUp('--health-mid');
            else healthDot.style.backgroundColor = varLookUp('--health-high');
        }

        function toggleCardFlip() {
            const card = document.getElementById('interactive-card');
            card.classList.toggle('flipped');
            
            const isFlipped = card.classList.contains('flipped');
            if (isFlipped) {
                document.getElementById('eval-actions-wrapper').style.display = 'grid';
                document.getElementById('request-hint-btn').style.display = 'none';
            }
        }

        function revealPassiveHint() {
            hintRequestedForCurrentCard = true;
            document.getElementById('hint-panel').style.display = 'flex';
            document.getElementById('request-hint-btn').style.display = 'none';
        }

        function handleEvaluationOutcome(isCorrect) {
            const currentItem = activeSessionQueue[currentActiveIndex];
            const matchedLexeme = lexemes.find(l => l.id === currentItem.id);

            if (matchedLexeme) {
                if (isCorrect) {
                    const elapsedHours = (Date.now() - matchedLexeme.lastTested) / (1000 * 60 * 60);
                    let adaptiveMultiplier = matchedLexeme.halfLifeHours < 48 ? 2.5 : 1.6;

                    if (hintRequestedForCurrentCard) {
                        adaptiveMultiplier *= 0.6;
                    }

                    const computedExtension = Math.max(elapsedHours, matchedLexeme.halfLifeHours) * adaptiveMultiplier;
                    matchedLexeme.halfLifeHours = Math.min(computedExtension, 720);
                } else {
                    if (matchedLexeme.halfLifeHours > 72) {
                        matchedLexeme.halfLifeHours = matchedLexeme.halfLifeHours * 0.5;
                    } else {
                        matchedLexeme.halfLifeHours = Math.max(matchedLexeme.halfLifeHours * 0.25, 4);
                    }
                }

                matchedLexeme.lastTested = Date.now();
                saveToStorage();
            }

            currentActiveIndex++;
            updateProgressBar();
            
            setTimeout(() => {
                renderCurrentSessionCard();
            }, 300);
        }

        function updateProgressBar() {
            const ratio = (currentActiveIndex / totalQueueLength) * 100;
            document.getElementById('session-progress').style.width = `${ratio}%`;
        }

        function completeSessionView() {
            exitSessionView();
            const streakElement = document.getElementById('streak-count');
            streakElement.innerText = parseInt(streakElement.innerText) + 1;
        }

        function exitSessionView() {
            views.stage.style.display = 'none';
            views.dashboard.style.display = 'flex';
            calculateAndRenderDashboard();
        }
    </script>
</body>
</html>

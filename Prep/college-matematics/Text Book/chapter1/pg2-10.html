                        <div>
                            <h4 class="text-sm font-semibold text-white uppercase tracking-wider mb-3">The Real Number Line & Coordinates</h4>
                            <p class="text-slate-300 text-sm leading-relaxed mb-3">Combining the sets of rational and irrational numbers forms the complete set of <strong class="text-white">Real Numbers</strong>. These can be visualized along a horizontal axis where every point has an absolute one-to-one correspondence with a real numerical value.</p>

                    <p class="text-slate-300 leading-relaxed mb-4">To evaluate complex mathematical expressions uniformly, operations must follow a strict sequential hierarchy to guarantee identical, valid outcomes.</p>
                    <div class="bg-slate-950 rounded-xl p-5 border border-slate-800/80 font-mono text-sm space-y-2 mb-6">
                        <div class="flex"><span class="text-indigo-400 w-8 font-bold">P</span> <span class="text-slate-300">Parentheses & Grouping Symbols (Brackets, Fraction Bars, Radicals, Absolute Value)</span></div>

                    <div class="space-y-6 border-t border-slate-800/80 pt-6">
                        <div>
                            <h4 class="text-sm font-semibold text-white uppercase tracking-wider mb-3">Example 1: Basic Operational Sequence</h4>
                            <div class="bg-slate-800/30 p-4 rounded-xl border border-slate-800 text-sm">
                                <p class="text-slate-400 mb-2">Evaluate: <span class="text-indigo-300 font-mono">24 + 6 · (2/3) - 4²</span></p>
                                <ol class="list-decimal list-inside space-y-1 font-mono text-xs text-slate-300">
                                    <li>No operations inside parentheses to evaluate further: 24 + 6 · (2/3) - 4²</li>
                                    <li>Address Exponent (<span class="text-rose-400">4² → 16</span>): 24 + 6 · (2/3) - 16</li>

                        <div>
                            <h4 class="text-sm font-semibold text-white uppercase tracking-wider mb-3">Example 2: Grouping via Fraction Bars</h4>
                            <div class="bg-slate-800/30 p-4 rounded-xl border border-slate-800 text-sm">
                                <p class="text-slate-400 mb-2">Evaluate: \\\\(\\\\frac{4 + 3 \\\\cdot 2^3}{4 - 2^2 + 8}\\\\)</p>
                                <p class="text-slate-300 text-xs mb-2">A fraction bar acts as a grouping symbol. Completely evaluate the numerator and denominator independently before dividing.</p>
                                <ul class="space-y-2 font-mono text-xs text-slate-300">
                                    <li>• <span class="text-indigo-400">Numerator:</span> \\\\(4 + 3 \\\\cdot 2^3 \\\\rightarrow 4 + 3 \\\\cdot 8 \\\\rightarrow 4 + 24 = 28\\\\)</li>
                                    <li>• <span class="text-indigo-400">Denominator:</span> \\\\(4 - 2^2 + 8 \\\\rightarrow 4 - 4 + 8 \\\\rightarrow 0 + 8 = 8\\\\)</li>
                                    <li>• <span class="text-indigo-400">Final Division:</span> \\\\(\\\\frac{28}{8} = \\\\frac{7}{2} = 3.5\\\\)</li>

                                <p class="text-slate-300 text-xs mb-2">When groupings are nested, always evaluate from the inside out.</p>

            {

                subtitle: "Operational Mechanics for Algebraic Rules",
                content: `
                    <p class="text-slate-300 leading-relaxed mb-6">Properties are structural foundational truths that apply to arithmetic operations. These rules allow us to manipulate expressions, combine like terms, and solve equations with algebraic certainty. Note that subtraction and division do not possess commutative or associative traits because changing their order or grouping alters the final value.</p>
                    
                    <div class="overflow-x-auto mb-8">
                        <table class="w-full text-left text-sm border-collapse">
                            <thead>
                                <tr class="border-b border-slate-800 text-slate-400 text-xs uppercase tracking-wider">
                                    <th class="py-3 pr-4">Property</th>
                                    <th class="py-3 px-4">Addition Rule</th>
                                    <th class="py-3 pl-4">Multiplication Rule</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-800/60 text-slate-300">
                                <tr>
                                    <td class="py-3 pr-4 font-semibold text-white">Commutative</td>
                                    <td class="py-3 px-4 font-mono text-indigo-300">a + b = b + a</td>
                                    <td class="py-3 pl-4 font-mono text-indigo-300">a · b = b · a</td>
                                </tr>
                                <tr>
                                    <td class="py-3 pr-4 font-semibold text-white">Associative</td>
                                    <td class="py-3 px-4 font-mono text-indigo-300">a + (b + c) = (a + b) + c</td>
                                    <td class="py-3 pl-4 font-mono text-indigo-300">a(bc) = (ab)c</td>
                                </tr>
                                <tr>
                                    <td class="py-3 pr-4 font-semibold text-white">Distributive</td>
                                    <td class="py-3 px-4 font-mono text-indigo-300" colspan="2">a · (b + c) = a · b + a · c</td>
                                </tr>
                                <tr>
                                    <td class="py-3 pr-4 font-semibold text-white">Identity</td>
                                    <td class="py-3 px-4 font-mono text-slate-400">a + 0 = a <span class="text-xs text-slate-500">(0 is additive identity)</span></td>
                                    <td class="py-3 pl-4 font-mono text-slate-400">a · 1 = a <span class="text-xs text-slate-500">(1 is mult. identity)</span></td>
                                </tr>
                                <tr>
                                    <td class="py-3 pr-4 font-semibold text-white">Inverse</td>
                                    <td class="py-3 px-4 font-mono text-slate-400">a + (-a) = 0 <span class="text-xs text-slate-500">(-a is opposite)</span></td>
                                    <td class="py-3 pl-4 font-mono text-slate-400">a · (1/a) = 1 <span class="text-xs text-slate-500">(1/a is reciprocal, a≠0)</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="space-y-6 border-t border-slate-800/80 pt-6">
                        <div>
                            <h4 class="text-sm font-semibold text-white uppercase tracking-wider mb-3">1. Commutative Properties (Order Rules)</h4>
                            <p class="text-slate-400 text-xs mb-3">The order in which you add or multiply numbers does not affect the result.</p>
                            <div class="bg-slate-800/30 p-4 rounded-xl border border-slate-800 text-sm space-y-2">
                                <p class="text-xs text-slate-300 font-mono">• Addition: \\\\(13 + 7 = 7 + 13 = 20\\\\)</p>
                                <p class="text-xs text-slate-300 font-mono">• Multiplication: \\\\(4 \\\\cdot 9 = 9 \\\\cdot 4 = 36\\\\)</p>
                                <p class="text-xs text-amber-400 italic font-sans mt-1">Counter-Examples (Why order matters): \\\\(8 - 3 \\\\neq 3 - 8\\\\) and \\\\(12 \\\\div 4 \\\\neq 4 \\\\div 12\\\\).</p>
                            </div>
                        </div>

                        <div>
                            <h4 class="text-sm font-semibold text-white uppercase tracking-wider mb-3">2. Associative Properties (Grouping Rules)</h4>
                            <p class="text-slate-400 text-xs mb-3">The grouping of three or more numbers under addition or multiplication does not change their sum or product.</p>
                            <div class="bg-slate-800/30 p-4 rounded-xl border border-slate-800 text-sm space-y-2">
                                <p class="text-xs text-slate-300 font-mono">• Addition: \\\\((2 + 5) + 8 = 7 + 8 = 15\\\\) is identical to \\\\(2 + (5 + 8) = 2 + 13 = 15\\\\)</p>
                                <p class="text-xs text-slate-300 font-mono">• Multiplication: \\\\((3 \\\\cdot 2) \\\\cdot 5 = 6 \\\\cdot 5 = 30\\\\) is identical to \\\\(3 \\\\cdot (2 \\\\cdot 5) = 3 \\\\cdot 10 = 30\\\\)</p>
                            </div>
                        </div>

                        <div>
                            <h4 class="text-sm font-semibold text-white uppercase tracking-wider mb-3">3. Distributive Property (Operational Multiplication)</h4>
                            <p class="text-slate-400 text-xs mb-3">Multiplying a number by a sum is equal to multiplying each addend separately and then adding the products together. This property can be applied from either side: \\\\((b + c)a = ba + ca\\\\).</p>
                            <div class="bg-slate-800/30 p-4 rounded-xl border border-slate-800 text-sm space-y-3">
                                <div>
                                    <p class="text-white font-medium font-mono text-xs">Example a. Numerical verification</p>
                                    <p class="text-xs text-slate-400 pl-4 font-mono">\\\\(5 \\\\cdot (3 + 4) = 5 \\\\cdot (7) = 35\\\\)</p>
                                    <p class="text-xs text-slate-400 pl-4 font-mono">\\\\((5 \\\\cdot 3) + (5 \\\\cdot 4) = 15 + 20 = 35\\\\)</p>
                                </div>
                                <div>
                                    <p class="text-white font-medium font-mono text-xs">Example b. Algebraic expansion</p>
                                    <p class="text-xs text-slate-400 pl-4 font-mono">\\\\(3(2x - 7) = 3(2x) + 3(-7) = 6x - 21\\\\)</p>
                                </div>
                            </div>
                        </div>

                        <div>
                            <h4 class="text-sm font-semibold text-white uppercase tracking-wider mb-3">4. Identity Properties (Preservation Rules)</h4>
                            <p class="text-slate-400 text-xs mb-3">The identity property maintains the original value of a real number when combined with a baseline constant.</p>
                            <div class="bg-slate-800/30 p-4 rounded-xl border border-slate-800 text-sm space-y-2">
                                <p class="text-xs text-slate-300 font-mono">• Additive Identity: Adding \\\\(0\\\\) leaves a value unchanged. \\\\(-14 + 0 = -14\\\\)</p>
                                <p class="text-xs text-slate-300 font-mono">• Multiplicative Identity: Multiplying by \\\\(1\\\\) leaves a value unchanged. \\\\(22 \\\\cdot 1 = 22\\\\)</p>
                            </div>
                        </div>

                        <div>
                            <h4 class="text-sm font-semibold text-white uppercase tracking-wider mb-3">5. Inverse Properties (Neutralization Rules)</h4>
                            <p class="text-slate-400 text-xs mb-3">Using an inverse operation cancels out a number, dropping it back to its respective baseline identity value.</p>
                            <div class="bg-slate-800/30 p-4 rounded-xl border border-slate-800 text-sm space-y-3">
                                <div>
                                    <p class="text-white font-medium font-mono text-xs">Additive Inverse (Opposites)</p>
                                    <p class="text-xs text-slate-400 pl-4">A number and its negative counterpart combine to produce the additive identity \\\\(0\\\\).</p>
                                    <p class="text-xs text-slate-300 font-mono pl-4">\\\\(8 + (-8) = 0\\\\)</p>
                                </div>
                                <div>
                                    <p class="text-white font-medium font-mono text-xs">Multiplicative Inverse (Reciprocals)</p>
                                    <p class="text-xs text-slate-400 pl-4">Any non-zero real number multiplied by its reciprocal \\\\(\\frac{1}{a}\\\\) results in the multiplicative identity \\\\(1\\\\).</p>
                                    <p class="text-xs text-slate-300 font-mono pl-4">\\\\(6 \\\\cdot \\\\frac{1}{6} = 1\\\\)</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `
            }
        ];

        // Core Application State
        let currentModuleIndex = 0;

        // DOM Element Cache
        const navLinksContainer = document.getElementById('nav-links');
        const moduleBody = document.getElementById('module-body');
        const progressBar = document.getElementById('progress-bar');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const menuToggle = document.getElementById('menu-toggle');
        const menuClose = document.getElementById('menu-close');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');

        // Navigation Builder Engine
        function initNavigation() {
            navLinksContainer.innerHTML = '';
            modules.forEach((mod, idx) => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-4 py-3 rounded-xl text-sm font-medium transition-all flex items-center justify-between group ${
                    idx === currentModuleIndex 
                    ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/10' 
                    : 'text-slate-400 hover:bg-slate-800/50 hover:text-slate-200'
                }`;
                btn.innerHTML = `
                    <span>${mod.title}</span>
                    <svg class="w-4 h-4 opacity-0 group-hover:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                `;
                btn.onclick = () => {
                    currentModuleIndex = idx;
                    renderModule();
                    closeMobileMenu();
                };
                navLinksContainer.appendChild(btn);
            });
        }

        // Module Render Engine
        function renderModule() {
            const module = modules[currentModuleIndex];
            
            // Render structured HTML view dynamically
            moduleBody.innerHTML = `
                <span class="text-xs font-bold tracking-widest text-indigo-400 uppercase block mb-2">Step ${currentModuleIndex + 1} of ${modules.length}</span>
                <h2 class="text-3xl font-bold text-white serif-title tracking-tight mb-1">${module.title}</h2>
                <p class="text-slate-400 text-sm mb-8 italic">${module.subtitle}</p>
                <div class="prose prose-invert max-w-none text-slate-300">
                    ${module.content}
                </div>
            `;

            // Update Global UI Elements
            initNavigation();
            updateProgress();

            // Handle Action Button States
            prevBtn.disabled = currentModuleIndex === 0;
            if (currentModuleIndex === modules.length - 1) {
                nextBtn.innerHTML = `Finish Module <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
            } else {
                nextBtn.innerHTML = `Next <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>`;
            }
            
            // Auto scroll main layout to top on load transitions
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            // Tell MathJax to scan the newly injected HTML for math symbols
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        function updateProgress() {
            const percentage = ((currentModuleIndex + 1) / modules.length) * 100;
            progressBar.style.width = `${percentage}%`;
        }

        // Mobile Sidebar Drawer Control Interactions
        function openMobileMenu() {
            sidebar.classList.remove('-translate-x-full');
            overlay.classList.remove('hidden');
        }

        function closeMobileMenu() {
            sidebar.classList.add('-translate-x-full');
            overlay.classList.add('hidden');
        }

        // Event Registration
        prevBtn.onclick = () => {
            if (currentModuleIndex > 0) {
                currentModuleIndex--;
                renderModule();
            }
        };

        nextBtn.onclick = () => {
            if (currentModuleIndex < modules.length - 1) {
                currentModuleIndex++;
                renderModule();
            } else {
                alert("Congratulations! You have completed all foundational modules covering pages 2 to 10.");
            }
        };

        menuToggle.onclick = openMobileMenu;
        menuClose.onclick = closeMobileMenu;
        overlay.onclick = closeMobileMenu;

        // Bootstrap App Engine Execution
        renderModule();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Portal - Quantitative Architecture</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-main: #0a0e17;
            --bg-card: #121824;
            --bg-nav: #0d131f;
            --accent-primary: #38bdf8;
            --accent-secondary: #818cf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #1e293b;
            --success: #34d399;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding-bottom: 4rem;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem 1.25rem;
        }

        header {
            margin-bottom: 2rem;
            text-align: center;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, var(--text-main), var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent-secondary);
            margin: 1.5rem 0 0.75rem 0.25rem;
            font-weight: 700;
        }

        /* --- Module Grid Menu Links --- */
        .module-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .module-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.2s ease, transform 0.15s ease;
        }

        .module-card:hover {
            border-color: rgba(56, 189, 248, 0.4);
            transform: translateY(-1px);
        }

        .module-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .module-icon {
            color: var(--accent-primary);
            background: rgba(56, 189, 248, 0.1);
            padding: 0.5rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .module-text-group {
            display: flex;
            flex-direction: column;
        }

        .module-id {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .module-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
            margin-top: 0.1rem;
        }

        .chevron {
            color: var(--text-muted);
            transition: transform 0.2s;
        }

        .module-card:hover .chevron {
            color: var(--accent-primary);
            transform: translateX(2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>College Mathematics</h1>
            <p>Modern States</p>
        </header>
        <div class="section-title">Textbook</div>
        <div class="module-list">
            
            <!-- Pages 2-10 -->
            <a href="./pg2-10.html" class="module-card">
                <div class="module-info">
                    <div class="module-icon"><i data-lucide="book-open"></i></div>
                    <div class="module-text-group">
                        <span class="module-id">Pages 2-10</span>
                        <span class="module-title">Prerequisites</span>
                    </div>
                </div>
                <i data-lucide="chevron-right" class="chevron" style="width: 18px;"></i>
            </a>
            <!-- Pages 11-20 -->
            <a href="./pg11-20.html" class="module-card">
                <div class="module-info">
                    <div class="module-icon"><i data-lucide="book-open"></i></div>
                    <div class="module-text-group">
                        <span class="module-id">Pages 11-20</span>
                        <span class="module-title">PEMDAS, Properties, Algebraic expressions</span>
                    </div>
                </div>
                <i data-lucide="chevron-right" class="chevron" style="width: 18px;"></i>
            </a>
            <!-- Pages 21-30 -->
            <a href="./pg21-30.html" class="module-card">
                <div class="module-info">
                    <div class="module-icon"><i data-lucide="book-open"></i></div>
                    <div class="module-text-group">
                        <span class="module-id">Pages 21-30</span>
                        <span class="module-title">Advanced Algebraic Prerequisites</span>
                    </div>
                </div>
                <i data-lucide="chevron-right" class="chevron" style="width: 18px;"></i>
            </a>


        </div>


            
  

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
